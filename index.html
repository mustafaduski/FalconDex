<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Falcon | Velvet Sovereign</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="falcon-illustration">
        <img src="https://raw.githubusercontent.com/Aras-7/Assets/main/falcon-lineart.png" alt="Falcon Art">
    </div>

    <div class="velvet-card">
        <div class="brand-header">
            <span class="dot"></span>
            <h1>FALCON</h1>
        </div>

        <div class="soft-input">
            <label>PAYMENT AMOUNT</label>
            <div class="row">
                <input type="number" placeholder="0.00" id="pay">
                <div class="token-pill">ETH</div>
            </div>
        </div>

        <div class="node-divider">
            <div class="node-line"></div>
            <div class="node-center">✧</div>
            <div class="node-line"></div>
        </div>

        <div class="soft-input active">
            <label>ESTIMATED RECEIVE</label>
            <div class="row">
                <input type="number" placeholder="0.00" id="receive" readonly>
                <div class="token-pill gold">FLCN</div>
            </div>
        </div>

        <button class="btn-velvet" id="swap-btn">
            <span class="btn-text">CONFIRM SWAP</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
