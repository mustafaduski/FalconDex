<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FALCON | world‑class dex</title>
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== INTRO OVERLAY (stroke animation + lens blur out) ========== -->
  <div class="intro-overlay" id="introOverlay">
    <div class="falcon-svg-wrapper">
      <svg width="300" height="240" viewBox="0 0 300 240" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Falcon silhouette – multiple paths for stroke animation -->
        <path class="falcon-stroke" d="M150 35 L215 90 L200 155 L160 190 L110 190 L70 155 L55 90 L150 35Z" stroke="#D4AF37" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="falcon-stroke" d="M120 125 L150 145 L180 125" stroke="#D4AF37" stroke-width="3" fill="none"/>
        <circle class="falcon-stroke" cx="150" cy="110" r="8" stroke="#D4AF37" stroke-width="2.5" fill="none"/>
        <path class="falcon-stroke" d="M90 75 L60 50 L80 30 M210 75 L240 50 L220 30" stroke="#D4AF37" stroke-width="2" stroke-dasharray="6 6"/>
        <path class="falcon-stroke" d="M120 190 L135 215 L165 215 L180 190" stroke="#D4AF37" stroke-width="2.5" fill="none"/>
      </svg>
    </div>
    <div class="intro-text">FALCON</div>
  </div>

  <!-- ========== MAIN DASHBOARD ========== -->
  <div class="dashboard" id="dashboard">
    <!-- cosmic bokeh background (canvas for mouse parallax) -->
    <canvas id="bokehCanvas" class="bokeh-canvas"></canvas>

    <!-- main glass card -->
    <div class="glass-card">
      <!-- header with logo and gold accents -->
      <div class="card-header">
        <span class="logo">⟁ FALCON</span>
        <button class="wallet-button" id="walletBtn">Connect wallet</button>
      </div>

      <!-- swap title & settings -->
      <div class="swap-header">
        <h1 class="swap-title">Swap</h1>
        <button class="settings-icon" id="settingsBtn">⚙️</button>
      </div>

      <!-- you pay input -->
      <div class="input-group" id="payGroup">
        <div class="input-label-row">
          <span class="input-label">You pay</span>
          <span class="balance" id="payBalance">12.542 ETH</span>
        </div>
        <div class="input-container">
          <input type="text" class="amount-input" id="payAmount" placeholder="0.00" value="1.0" inputmode="decimal">
          <button class="token-button" id="payTokenBtn">ETH <span class="chevron">▼</span></button>
        </div>
        <div class="input-footer">
          <span class="usd-estimate" id="payUsd">≈ $1,850.45</span>
          <button class="max-button" id="maxBtn">MAX</button>
        </div>
      </div>

      <!-- swap arrow (animated) -->
      <div class="swap-arrow" id="swapArrow">
        <div class="arrow-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2">
            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" />
          </svg>
        </div>
      </div>

      <!-- you receive input -->
      <div class="input-group">
        <div class="input-label-row">
          <span class="input-label">You receive</span>
          <span class="balance" id="receiveBalance">8,450.32 FLCN</span>
        </div>
        <div class="input-container">
          <input type="text" class="amount-input" id="receiveAmount" placeholder="0.00" readonly>
          <button class="token-button" id="receiveTokenBtn">FLCN <span class="chevron">▼</span></button>
        </div>
        <div class="input-footer">
          <span class="usd-estimate" id="receiveUsd">≈ $1,849.70</span>
          <span class="price-impact" id="impact">0.08%</span>
        </div>
      </div>

      <!-- rate info -->
      <div class="rate-row">
        <span>Rate</span>
        <span id="rateDisplay">1 ETH ≈ 1,450.75 FLCN</span>
      </div>

      <!-- liquid gold action button -->
      <button class="action-button" id="actionBtn">
        <span class="btn-text">Swap now</span>
        <span class="btn-shine"></span>
      </button>
    </div>

    <!-- ========== TOKEN MODAL (iOS‑style slide‑in) ========== -->
    <div class="modal-overlay" id="tokenModal">
      <div class="modal-container">
        <div class="modal-header">
          <h3>Select token</h3>
          <button class="close-modal" id="closeModal">✕</button>
        </div>
        <div class="modal-search">
          <input type="text" placeholder="Search name or paste address" class="search-input">
        </div>
        <div class="token-list">
          <div class="token-item" data-symbol="ETH" data-balance="12.542" data-price="1850.45">
            <span class="token-symbol">ETH</span>
            <span class="token-name">Ethereum</span>
            <span class="token-balance">12.542</span>
          </div>
          <div class="token-item" data-symbol="FLCN" data-balance="8450.32" data-price="1.275">
            <span class="token-symbol">FLCN</span>
            <span class="token-name">Falcon</span>
            <span class="token-balance">8450.32</span>
          </div>
          <div class="token-item" data-symbol="USDC" data-balance="15420.89" data-price="1.00">
            <span class="token-symbol">USDC</span>
            <span class="token-name">USD Coin</span>
            <span class="token-balance">15420.89</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
