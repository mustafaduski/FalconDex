<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LUX DEX | gold edition</title>
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <!-- main style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- cosmic orbs (background) -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="app-container">
        <!-- navigation -->
        <nav class="navbar">
            <div class="logo">
                <span class="logo-gold">✦</span> AURORA
            </div>
            <button class="connect-wallet" id="connectBtn">Connect Wallet</button>
        </nav>

        <!-- main swap card -->
        <main class="swap-card">
            <!-- card header -->
            <div class="card-header">
                <h2 class="card-title">Swap</h2>
                <button class="settings-icon" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.8" fill="none">
                        <circle cx="12" cy="12" r="1.5" />
                        <circle cx="12" cy="5" r="1.5" />
                        <circle cx="12" cy="19" r="1.5" />
                    </svg>
                </button>
            </div>

            <!-- you pay section -->
            <div class="input-section">
                <div class="input-label-row">
                    <span class="input-label">You Pay</span>
                    <span class="usd-estimate">≈ $0.00</span>
                </div>
                <div class="input-content">
                    <input type="text" class="amount-input" id="payAmount" placeholder="0.00" inputmode="decimal" value="1.0">
                    <button class="token-selector" id="payTokenBtn">
                        <span class="token-symbol">ETH</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                </div>
                <div class="balance-row">
                    <span class="balance-text">Balance: 12.542 ETH</span>
                </div>
            </div>

            <!-- swap arrow -->
            <div class="swap-arrow-wrapper" id="swapArrow">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.8" fill="none">
                    <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" />
                </svg>
            </div>

            <!-- you receive section -->
            <div class="input-section">
                <div class="input-label-row">
                    <span class="input-label">You Receive</span>
                    <span class="usd-estimate">≈ $0.00</span>
                </div>
                <div class="input-content">
                    <input type="text" class="amount-input" id="receiveAmount" placeholder="0.00" inputmode="decimal" readonly>
                    <button class="token-selector" id="receiveTokenBtn">
                        <span class="token-symbol">FLCN</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                </div>
                <div class="balance-row">
                    <span class="balance-text">Balance: 8450.32 FLCN</span>
                </div>
            </div>

            <!-- main action button -->
            <button class="main-action-btn" id="mainActionBtn">Enter an amount</button>
        </main>
    </div>

    <!-- javascript -->
    <script src="script.js"></script>
</body>
</html>
